# Self-contained PR gate for this Go CLI. build/vet/gofmt/test block; lint is
# advisory until the repo's pre-existing findings are cleared (then drop
# continue-on-error). Toolchain is read from go.mod — never hardcode a version.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "::error::These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi
      - name: Test
        run: go test -race ./...
      - name: Lint (advisory)
        continue-on-error: true
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
